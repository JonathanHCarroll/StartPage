<script>
  (function () {
    function pad(n) {
      return n < 10 ? '0' + n : String(n);
    }

    function updateClock() {
      var now = new Date();
      var greetingEl = document.getElementById('greeting');
      var datetimeEl = document.getElementById('datetime');

      if (!greetingEl || !datetimeEl) return;

      var hour = now.getHours();
      var greeting;
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 17) greeting = 'Good afternoon';
      else greeting = 'Good evening';

      greetingEl.textContent = greeting;

      var options = { weekday: 'long', month: 'long', day: 'numeric' };
      var dateStr = now.toLocaleDateString(undefined, options);
      var timeStr = pad(now.getHours()) + ':' + pad(now.getMinutes());
      datetimeEl.textContent = dateStr + ' · ' + timeStr;
    }

    updateClock();
    setInterval(updateClock, 30000);

    var search = document.getElementById('search');
    if (search) {
      search.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && search.value.trim()) {
          window.location.href = 'https://www.google.com/search?q=' +
            encodeURIComponent(search.value.trim());
        }
      });
    }

    document.querySelectorAll('.favicon').forEach(function (img) {
      img.addEventListener('error', function () {
        img.style.visibility = 'hidden';
      });
    });
  })();
</script>
